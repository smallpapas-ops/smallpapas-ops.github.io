<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="手術室護理">
<meta name="theme-color" content="#0d47a1">
<meta name="description" content="恩主公醫院手術室護理人員資歷與證照管理系統">
<title>手術室護理人員管理系統</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;font-size:14px;color:#1a1a2e}
:root{
  --primary:#1565c0;--primary-dark:#0d47a1;--primary-light:#e3f2fd;
  --success:#2e7d32;--success-light:#e8f5e9;
  --warn:#e65100;--warn-light:#fff3e0;
  --danger:#c62828;--danger-light:#ffebee;
  --purple:#4527a0;--purple-light:#ede7f6;
  --teal:#00695c;--teal-light:#e0f2f1;
  --gray:#546e7a;--gray-light:#eceff1;
  --border:#dde3ea;--bg:#f0f2f5;--surface:#ffffff;
  --sidebar-w:220px;--topbar-h:52px;--bottom-nav-h:60px;
}

/* ── Layout ─────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* Top bar */
.topbar{height:var(--topbar-h);background:var(--primary-dark);color:#fff;display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);position:relative;z-index:30}
.topbar-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.topbar-logo svg{width:20px;height:20px;fill:#fff;opacity:.9;flex-shrink:0}
.topbar-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;opacity:.65;margin-left:4px;display:none}
.topbar-date{font-size:11px;opacity:.75;white-space:nowrap;flex-shrink:0}
.topbar-actions{display:flex;gap:6px;flex-shrink:0}
.topbar-btn{padding:5px 11px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;font-family:inherit}
.topbar-btn:hover,.topbar-btn:active{background:rgba(255,255,255,.28)}
.menu-btn{display:none;background:none;border:none;color:#fff;cursor:pointer;padding:6px;border-radius:6px}
.menu-btn:active{background:rgba(255,255,255,.2)}

/* Body wrap */
.body-wrap{display:flex;flex:1;overflow:hidden}

/* Sidebar – desktop */
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s ease;z-index:20}
.sidebar-section{padding:12px 10px 5px;font-size:10px;font-weight:600;color:#90a4ae;letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;color:var(--gray);font-size:13px;transition:all .15s;margin:1px 0;user-select:none}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.65}
.nav-item:hover,.nav-item:active{background:var(--primary-light);color:var(--primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.nav-item.active svg{opacity:1}
.nav-label{flex:1}
.nav-badge{background:var(--danger);color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;font-weight:600;min-width:18px;text-align:center}
.nav-badge.warn{background:var(--warn)}
.sidebar-footer{margin-top:auto;padding:10px;border-top:1px solid var(--border);font-size:11px;color:#90a4ae;text-align:center}

/* Overlay for mobile sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19}

/* Bottom nav – mobile only */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:#fff;border-top:1px solid var(--border);z-index:25;padding:0 4px;padding-bottom:env(safe-area-inset-bottom)}
.bnav-wrap{display:flex;height:100%}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#90a4ae;font-size:9px;padding:4px 2px;border-radius:8px;transition:color .15s;position:relative;user-select:none}
.bnav-item svg{width:20px;height:20px}
.bnav-item.active{color:var(--primary)}
.bnav-item .bnav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--danger);color:#fff;font-size:9px;border-radius:8px;padding:0 4px;min-width:14px;text-align:center;line-height:14px}

/* Main content */
.main{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* ── Cards & KPIs ─────────────────── */
.page-title{font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.page-sub{font-size:12px;color:#78909c;margin-bottom:14px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.kpi.blue::before{background:var(--primary)}.kpi.green::before{background:var(--success)}
.kpi.orange::before{background:var(--warn)}.kpi.red::before{background:var(--danger)}
.kpi.purple::before{background:var(--purple)}.kpi.teal::before{background:var(--teal)}
.kpi-label{font-size:11px;color:#78909c;margin-bottom:5px}
.kpi-val{font-size:24px;font-weight:700;line-height:1;color:#1a1a2e}
.kpi-sub{font-size:10px;color:#90a4ae;margin-top:3px;line-height:1.5}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.card-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:#37474f;display:flex;align-items:center;gap:5px}
.card-body{padding:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── Alerts ─────────────────────────── */
.alert{padding:9px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:10px;border-left:4px solid}
.alert-danger{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}
.alert-warn{background:var(--warn-light);color:var(--warn);border-color:var(--warn)}

/* ── Toolbar ─────────────────────────── */
.toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.toolbar input[type=text]{padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:120px;transition:border .15s}
.toolbar input[type=text]:focus{border-color:var(--primary)}
.toolbar select{padding:8px 9px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;outline:none;cursor:pointer}
.toolbar-right{display:flex;gap:6px;margin-left:auto}

/* ── Buttons ─────────────────────────── */
.btn{padding:8px 13px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:1px solid;transition:all .15s;font-weight:500;white-space:nowrap;-webkit-appearance:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-success:hover{background:#004d40}
.btn-outline{background:#fff;color:#546e7a;border-color:var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:#ef9a9a}
.btn-danger:hover{background:#ffcdd2}
.btn-sm{padding:5px 9px;font-size:11px}

/* ── Table ─────────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 10px;background:#f5f7fa;font-size:11px;font-weight:600;color:#546e7a;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.td-muted{font-size:11px;color:#90a4ae}
tfoot td{padding:8px 10px;background:#f5f7fa;border-top:2px solid var(--border)}

/* ── Badges ─────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ok{background:var(--success-light);color:var(--success)}
.soon{background:var(--warn-light);color:var(--warn)}
.exp{background:var(--danger-light);color:var(--danger)}
.none{background:var(--gray-light);color:var(--gray)}
.b-blue{background:var(--primary-light);color:var(--primary)}
.b-purple{background:var(--purple-light);color:var(--purple)}
.b-teal{background:var(--teal-light);color:var(--teal)}

/* ── Progress ─────────────────────── */
.prog-wrap{background:#eceff1;border-radius:4px;height:7px;overflow:hidden;min-width:50px}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog-ok{background:var(--success)}.prog-soon{background:var(--warn)}.prog-exp{background:var(--danger)}

/* ── Bar chart inline ─────────────── */
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bar-lbl{width:60px;font-size:11px;color:#78909c;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#eceff1;border-radius:4px;height:17px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:#fff;transition:width .5s}
.bar-n{width:24px;font-size:11px;font-weight:600;color:#37474f;text-align:right}

/* ── Modal ─────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 28px;width:100%;max-width:600px;max-height:92vh;max-height:92dvh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:#dde3ea;border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;gap:7px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.form-field label{font-size:11px;font-weight:600;color:#546e7a;display:block;margin-bottom:3px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;background:#fff;color:#1a1a2e;-webkit-appearance:none}
.form-field input:focus,.form-field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.1)}
.form-section{font-size:11px;font-weight:600;color:#90a4ae;text-transform:uppercase;letter-spacing:.8px;margin:13px 0 7px;padding-top:11px;border-top:1px solid var(--border)}

/* ── Lock screen ─────────────────── */
.lock-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:32px 16px}
.lock-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:320px;text-align:center;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.07)}
.lock-icon{font-size:44px;margin-bottom:10px}
.lock-title{font-size:16px;font-weight:700;margin-bottom:5px}
.lock-sub{font-size:13px;color:#78909c;margin-bottom:18px;line-height:1.6}
.lock-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:9px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:10px;font-family:inherit;-webkit-appearance:none}
.lock-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.1)}
.lock-err{color:var(--danger);font-size:12px;min-height:18px;margin-bottom:8px}

/* ── Inner tabs ─────────────────── */
.inner-tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.inner-tabs::-webkit-scrollbar{display:none}
.itab{padding:7px 13px;font-size:12px;font-weight:500;cursor:pointer;color:#78909c;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.itab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Stat boxes ─────────────────── */
.stat-box{background:var(--bg);border-radius:8px;padding:11px;text-align:center}
.stat-box-val{font-size:20px;font-weight:700;line-height:1.1}
.stat-box-lbl{font-size:11px;color:#78909c;margin-top:3px}

/* ── Toast ─────────────────────── */
#toast{position:fixed;bottom:calc(var(--bottom-nav-h) + 12px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;max-width:90vw}

/* ── Modal footer ─────────────── */
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/* ── Scrollbar ─────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f2f5}
::-webkit-scrollbar-thumb{background:#cfd8dc;border-radius:3px}

/* ── Print ─────────────────────── */
@media print{.sidebar,.topbar-btn,.btn,.toolbar-right,.bottom-nav,.menu-btn{display:none!important}.main{padding:0}}

/* ══════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════ */

/* ── Tablet (≤900px): narrower sidebar */
@media(max-width:900px){
  :root{--sidebar-w:190px}
  .topbar-sub{display:none}
  .main{padding:12px}
}

/* ── Mobile (≤680px): bottom nav, no sidebar */
@media(max-width:680px){
  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .menu-btn{display:flex;align-items:center;justify-content:center}
  .bottom-nav{display:flex}
  .main{padding:10px 10px calc(var(--bottom-nav-h) + 10px);padding-bottom:calc(var(--bottom-nav-h) + 10px + env(safe-area-inset-bottom))}
  #toast{bottom:calc(var(--bottom-nav-h) + 8px)}
  .kpi-row{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:20px}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .page-title{font-size:15px}
  .toolbar{gap:6px}
  .toolbar-right{margin-left:0;width:100%}
  .toolbar-right .btn{flex:1;justify-content:center}
  .topbar-actions .topbar-btn:not(:last-child){display:none}
  .topbar-date{display:none}
  table{font-size:11px}
  thead th{padding:7px 7px;font-size:10px}
  tbody td{padding:6px 7px}
}

/* ── Small mobile (≤380px) */
@media(max-width:380px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .kpi{padding:10px 11px}
  .kpi-val{font-size:18px}
  .btn{padding:7px 10px;font-size:11px}
}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="選單">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <span class="topbar-title">手術室護理人員管理系統</span>
      <span class="topbar-sub">恩主公醫院</span>
    </div>
    <span class="topbar-date" id="topbar-date"></span>
    <span id="sync-indicator" style="font-size:11px;opacity:.9;flex-shrink:0;margin-left:2px"></span>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="loadFromFirebase()">🔄 同步</button>
      <button class="topbar-btn" onclick="exportCSV('staff')">⬇ 匯出</button>
      <button class="topbar-btn" onclick="window.print()">🖨 列印</button>
    </div>
  </div>

  <div class="body-wrap">
    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">主要功能</div>
      <div class="nav-item active" onclick="nav(0)" id="nav0">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span class="nav-label">首頁總覽</span>
      </div>
      <div class="nav-item" onclick="nav(1)" id="nav1">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span class="nav-label">人員明細總表</span>
      </div>
      <div class="nav-item" onclick="nav(2)" id="nav2">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        <span class="nav-label">人員通訊表 🔒</span>
      </div>
      <div class="nav-item" onclick="nav(3)" id="nav3">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <span class="nav-label">急救證照</span>
        <span class="nav-badge warn" id="nb3" style="display:none"></span>
      </div>
      <div class="nav-item" onclick="nav(4)" id="nav4">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span class="nav-label">壓力鍋技術士</span>
      </div>

// ── Inline minimal chart renderer (no CDN needed) ──────────────
window.Chart = (function(){
  const COLORS=['#1565c0','#c62828','#185fa5','#4527a0','#00695c','#e65100','#546e7a','#2e7d32'];
  function Chart(canvas, config){
    this.canvas=canvas; this.config=config;
    this._draw();
  }
  Chart.prototype.destroy=function(){
    if(this.canvas) this.canvas.getContext('2d').clearRect(0,0,this.canvas.width,this.canvas.height);
  };
  Chart.prototype._draw=function(){
    const c=this.canvas, cfg=this.config;
    if(!c) return;
    const ctx=c.getContext('2d');
    const W=c.parentElement?c.parentElement.offsetWidth||360:360;
    const H=c.parentElement?c.parentElement.offsetHeight||200:200;
    c.width=W; c.height=H;
    const data=cfg.data, opts=cfg.options||{};
    const labels=data.labels||[];
    const datasets=data.datasets||[];
    // Margins
    const ml=48,mr=48,mt=16,mb=32;
    const cw=W-ml-mr, ch=H-mt-mb;
    if(cw<=0||ch<=0) return;

    // Collect bar+line datasets
    const barDS=datasets.filter(d=>!d.type||d.type==='bar');
    const lineDS=datasets.filter(d=>d.type==='line');

    // Compute stacked max for bars (y axis)
    const barTotals=labels.map((_,i)=>barDS.reduce((s,d)=>s+(d.data[i]||0),0));
    const lineVals=lineDS.flatMap(d=>d.data||[]).filter(v=>v!=null);
    const barMax=Math.max(...barTotals,1);
    const lineMax=lineDS.length?Math.max(...lineVals,1):0;

    // Grid lines
    ctx.strokeStyle='#f0f2f5'; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const y=mt+ch-(ch*i/4);
      ctx.beginPath(); ctx.moveTo(ml,y); ctx.lineTo(W-mr,y); ctx.stroke();
    }

    // Y axis labels (left - bar)
    ctx.fillStyle='#90a4ae'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='right';
    for(let i=0;i<=4;i++){
      const y=mt+ch-(ch*i/4);
      const val=Math.round(barMax*i/4);
      ctx.fillText(val,ml-4,y+3);
    }

    // Y axis labels (right - line, if exists)
    if(lineDS.length){
      ctx.textAlign='left';
      for(let i=0;i<=4;i++){
        const y=mt+ch-(ch*i/4);
        const val=(lineMax*i/4).toFixed(1);
        ctx.fillText(val+'%',W-mr+4,y+3);
      }
    }

    // Draw bars (stacked)
    const bw=Math.max(8,Math.min(40,cw/labels.length*0.6));
    const gap=cw/labels.length;
    labels.forEach((lbl,i)=>{
      let yBase=mt+ch;
      barDS.forEach((ds,di)=>{
        const val=ds.data[i]||0;
        if(val===0) return;
        const bh=ch*val/barMax;
        const x=ml+gap*i+gap/2-bw/2;
        ctx.fillStyle=ds.backgroundColor||COLORS[di%COLORS.length];
        ctx.strokeStyle=ds.borderColor||'transparent';
        ctx.lineWidth=ds.borderWidth||0;
        ctx.fillRect(x,yBase-bh,bw,bh);
        if(ds.borderWidth) ctx.strokeRect(x,yBase-bh,bw,bh);
        yBase-=bh;
      });
    });

    // Draw lines
    lineDS.forEach((ds,li)=>{
      const pts=ds.data||[];
      const yAxis=ds.yAxisID==='y2';
      const maxV=yAxis?lineMax:barMax;
      ctx.strokeStyle=ds.borderColor||COLORS[(barDS.length+li)%COLORS.length];
      ctx.lineWidth=ds.borderWidth||2;
      ctx.setLineDash(ds.borderDash||[]);
      ctx.beginPath();
      pts.forEach((v,i)=>{
        if(v==null) return;
        const x=ml+cw/labels.length*i+cw/labels.length/2;
        const y=mt+ch-ch*v/maxV;
        i===0||pts.slice(0,i).every(p=>p==null)?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
      // Points
      if(ds.pointRadius>0){
        pts.forEach((v,i)=>{
          if(v==null) return;
          const x=ml+cw/labels.length*i+cw/labels.length/2;
          const y=mt+ch-ch*v/Math.max(maxV,1);
          ctx.beginPath(); ctx.arc(x,y,ds.pointRadius||3,0,Math.PI*2);
          ctx.fillStyle=ds.pointBackgroundColor||ds.borderColor;
          ctx.fill();
        });
      }
    });

    // X labels
    ctx.fillStyle='#546e7a'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='center';
    labels.forEach((lbl,i)=>{
      const x=ml+gap*i+gap/2;
      ctx.fillText(lbl,x,H-4);
    });
  };
  return Chart;
})();

// HELPERS

function calcSen(d){
  if(!d)return{y:0,m:0,text:'—'};
  const j=new Date(d),t=TODAY;
  let y=t.getFullYear()-j.getFullYear(),m=t.getMonth()-j.getMonth();
  if(m<0){y--;m+=12;}
  return{y,m,text:`${y}年${m}個月`};
}
function calcLeave(d){
  const{y,m}=calcSen(d);const tot=y*12+m;
  if(tot<6)return 0;if(tot<18)return 3;if(tot<30)return 7;if(tot<42)return 10;
  if(tot<54)return 14;if(tot<66)return 15;if(tot<78)return 16;if(tot<90)return 17;
  if(tot<102)return 18;if(tot<114)return 19;if(tot<126)return 20;if(tot<138)return 21;
  if(tot<150)return 22;if(tot<162)return 23;if(tot<174)return 24;if(tot<186)return 25;
  return 30;
}
function certSt(d){
  if(!d)return{s:'none',lbl:'無記錄',cls:'none',days:null};
  const exp=new Date(d),diff=Math.floor((exp-TODAY)/86400000);
  if(diff<0)return{s:'exp',lbl:'已過期',cls:'exp',days:diff};
  if(diff<=90)return{s:'soon',lbl:'即將到期',cls:'soon',days:diff};
  return{s:'ok',lbl:'有效',cls:'ok',days:diff};
}
function boilerSt(dateStr,years=3){
  if(!dateStr)return{s:'none',lbl:'無資料',cls:'none',expDate:'',days:null};
  const exp=new Date(dateStr);exp.setFullYear(exp.getFullYear()+years);
  const diff=Math.floor((exp-TODAY)/86400000);
  const ds=exp.toISOString().slice(0,10);
  if(diff<0)return{s:'exp',lbl:'已過期',cls:'exp',expDate:ds,days:diff};
  if(diff<=180)return{s:'soon',lbl:'即將到期',cls:'soon',expDate:ds,days:diff};
  return{s:'ok',lbl:'有效',cls:'ok',expDate:ds,days:diff};
}
function fd(d){return d?d.replace(/-/g,'/'):' — ';}
function active(){return staff.filter(s=>!s.resigned);}
function pct(n,t){return t>0?((n/t)*100).toFixed(0)+'%':'0%';}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});chartInstances={};}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sidebar-overlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
}

function nav(n){
  activeTab=n;
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',i===n));
  // sync bottom nav (tabs: 0→bnav0, 1→bnav1, 3→bnav3, 5→bnav5, 6→bnav6)
  [0,1,3,5,6].forEach(t=>{
    const el=document.getElementById('bnav'+t);
    if(el) el.classList.toggle('active',t===n);
  });
  closeSidebar();
  destroyCharts();
  render();
}
function updateBadges(){
  const as=active();
  const certKeys=['bls','acls','als'];
  const alertN=as.reduce((n,s)=>n+certKeys.filter(k=>{const st=certSt(s[k]);return st.s==='exp'||st.s==='soon';}).length,0);
  const nb3=document.getElementById('nb3');
  if(nb3){nb3.style.display=alertN?'':'none';nb3.textContent=alertN;}
  const nbb3=document.getElementById('nbb3');
  if(nbb3){nbb3.style.display=alertN?'':'none';nbb3.textContent=alertN;}
}

function render(){
  const el=document.getElementById('main');
  switch(activeTab){
    case 0:el.innerHTML=renderHome();break;
    case 1:el.innerHTML=renderDetail();break;
    case 2:el.innerHTML=renderContact();break;
    case 3:el.innerHTML=renderCerts();break;
    case 4:el.innerHTML=renderBoiler();break;
    case 5:el.innerHTML=renderStats();setTimeout(drawStatCharts,60);break;
    case 6:el.innerHTML=renderResign();setTimeout(drawResignChart,60);break;
  }
  updateBadges();
}

function renderCerts(){
  const as=active();
  const certDefs=[{key:'bls',lbl:'BLS',yrs:2},{key:'acls',lbl:'ACLS',yrs:3},{key:'als',lbl:'ALS',yrs:2}];
  const sf=document.getElementById('cf')?.value||'all';
  const ct=document.getElementById('ct')?.value||'all';
  const expN=as.reduce((n,s)=>n+certDefs.filter(c=>certSt(s[c.key]).s==='exp').length,0);
  const soonN=as.reduce((n,s)=>n+certDefs.filter(c=>certSt(s[c.key]).s==='soon').length,0);
  let rows=[];
  as.forEach(s=>certDefs.forEach(cd=>{
    if(ct!=='all'&&cd.lbl!==ct)return;
    const st=certSt(s[cd.key]);
    if(sf==='all'||st.s===sf)rows.push({s,cd,st});
  }));
  rows.sort((a,b)=>(a.st.days??99999)-(b.st.days??99999));
  return`
  <div class="page-title">急救證照管理</div>
  <div class="page-sub">BLS (2年) · ACLS (3年) · ALS (2年)</div>
  ${expN>0?`<div class="alert alert-danger">⚠️ ${expN} 筆已過期，請立即複訓！</div>`:''}
  ${soonN>0?`<div class="alert alert-warn">🔔 ${soonN} 筆 90 天內到期</div>`:''}
  <div class="toolbar">
    <select id="ct" onchange="render()">
      <option value="all">全部證照</option>
      <option value="BLS">BLS (2年)</option>
      <option value="ACLS">ACLS (3年)</option>
      <option value="ALS">ALS (2年)</option>
    </select>
    <select id="cf" onchange="render()">
      <option value="all">全部狀態</option>
      <option value="ok">✅ 有效</option>
      <option value="soon">⚠️ 即將到期</option>
      <option value="exp">❌ 已過期</option>
      <option value="none">— 無記錄</option>
    </select>
    <div class="toolbar-right">
      <button class="btn btn-success" onclick="exportCSV('cert')">⬇ 匯出</button>
    </div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
    <table>
      <thead><tr><th>員編</th><th>姓名</th><th>職稱</th><th>證照</th><th>到期日</th><th>狀態</th><th>剩餘天數</th><th>效期進度</th></tr></thead>
      <tbody>
      ${rows.map(({s,cd,st})=>{
        const totalDays=cd.yrs*365;
        const pctLeft=st.days!==null&&st.days>=0?Math.min(100,Math.round(st.days/totalDays*100)):0;
        const pgcls=st.s==='ok'?'prog-ok':st.s==='soon'?'prog-soon':'prog-exp';
        return`<tr>
          <td class="td-muted">${s.id}</td>
          <td><strong>${s.name}</strong></td>
          <td>${s.title}</td>
          <td><span class="badge b-purple">${cd.lbl}</span></td>
          <td class="td-muted">${fd(s[cd.key])}</td>
          <td><span class="badge ${st.cls}">${st.lbl}</span></td>
          <td style="text-align:center;font-weight:${st.days!==null&&st.days<=30?700:400};color:${st.days!==null&&st.days<=30?'#c62828':'inherit'}">${st.days!==null?st.days+'天':'—'}</td>
          <td style="min-width:80px">${st.days!==null&&st.days>=0?`<div class="prog-wrap"><div class="prog-fill ${pgcls}" style="width:${pctLeft}%"></div></div><div style="font-size:10px;color:#90a4ae;margin-top:2px">${pctLeft}%</div>`:'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

function renderStats(){
  const tabs=['執照別分布','學歷分布','年資分布','進階職級分布','急救證照分布'];
  return`

  <div class="inner-tabs">

  </div>
  <div id="stats-body">${renderStatsBody()}</div>`;
}
function renderStatsBody(){
  const as=active().filter(s=>s.title!=='助理員');
  const titles=['護理長','副護理長','組長','護理師','護士'];
  let cats,dataFn;
  if(statsSubTab===0){
    cats=['護理師','護士'];
    dataFn=(cat,t)=>as.filter(s=>s.title===t&&s.licType===cat).length;
  }else if(statsSubTab===1){
    cats=['研究所','大學','專科'];
    dataFn=(cat,t)=>as.filter(s=>s.title===t&&(s.edu||'').includes(cat)).length;
  }else if(statsSubTab===2){
    cats=['1年以下','1-2年','2-5年','5-10年','10-15年','15-20年','20-25年','25年以上'];
    dataFn=(cat,t)=>as.filter(s=>{
      if(s.title!==t)return false;
      const y=calcSen(s.joinDate).y;
      if(cat==='1年以下')return y<1;if(cat==='1-2年')return y>=1&&y<2;
      if(cat==='2-5年')return y>=2&&y<5;if(cat==='5-10年')return y>=5&&y<10;
      if(cat==='10-15年')return y>=10&&y<15;if(cat==='15-20年')return y>=15&&y<20;
      if(cat==='20-25年')return y>=20&&y<25;if(cat==='25年以上')return y>=25;
      return false;
    }).length;
  }else if(statsSubTab===3){
    cats=['N4','N3','N2','N1','N'];
    dataFn=(cat,t)=>as.filter(s=>s.title===t&&s.level===cat).length;
  }else{
    cats=['BLS','ACLS','ALS'];
    dataFn=(cat,t)=>as.filter(s=>s.title===t&&certSt(s[cat.toLowerCase()]).s==='ok').length;
  }
  const rowTotals=cats.map(c=>titles.reduce((n,t)=>n+dataFn(c,t),0));
  const grand=rowTotals.reduce((a,b)=>a+b,0);
  const colors=['#1565c0','#4527a0','#00695c','#e65100','#546e7a','#c62828','#6a1b9a','#00838f'];
  return`
  <div class="card">
    <div class="card-body">
      <div class="tbl-wrap" style="margin-bottom:20px">
      <table>
        <thead><tr><th>項目</th>${titles.map(t=>`<th>${t}</th>`).join('')}<th>合計</th><th>佔比</th></tr></thead>
        <tbody>
        ${cats.map((cat,ci)=>{
          const tot=rowTotals[ci];
          const p=grand>0?((tot/grand)*100).toFixed(1):0;
          return`<tr>
            <td><span class="badge b-blue">${cat}</span></td>
            ${titles.map(t=>`<td style="text-align:center">${dataFn(cat,t)||'—'}</td>`).join('')}
            <td style="text-align:center;font-weight:700">${tot}</td>
            <td style="text-align:center;color:#1565c0;font-weight:600">${p}%</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px">
        ${cats.map((c,i)=>`<span style="display:flex;align-items:center;gap:5px;font-size:12px;color:#546e7a"><span style="width:12px;height:12px;border-radius:3px;background:${colors[i%colors.length]}"></span>${c}</span>`).join('')}
      </div>
      <div style="position:relative;height:${Math.max(200,cats.length*38+60)}px">
        <canvas id="statsChart" role="img" aria-label="統計分析圖表"></canvas>
      </div>
    </div>
  </div>`;
}

  const colors=['#1565c0','#4527a0','#00695c','#e65100','#546e7a','#c62828','#6a1b9a','#00838f'];
  try{
    chartInstances['stats']=new Chart(canvas,{
      type:'bar',
      data:{labels:titles,datasets:cats.map((cat,i)=>({label:cat,data:titles.map(t=>dataFn(cat,t)),backgroundColor:colors[i%colors.length]+'CC',borderColor:colors[i%colors.length],borderWidth:1}))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1}}}}
    });
  }catch(e){}
}

function resignCalc(yr){
  const as=active();
  // 分母 = 各月在職人數：期初在職 + 當月新進（joinDate 在該月）
  // 分子 = 各月離職人數
  // 期間實際護理人數 = 在職人數（當月底） = 上月底在職 + 當月新進 - 當月離職
  // 簡化：分母為 年初在職人數 + 當月前已到職人數（累計）
  const allStaff = staff; // 含離職
  const monthly = Array.from({length:12},(_,i)=>{
    const resCount = resignations.filter(r=>{const d=new Date(r.resDate);return d.getFullYear()===yr&&d.getMonth()===i;}).length;
    // 期間內實際護理人數 = 當月有在職記錄的人數（到職日 <= 月底，且離職日 > 月初 or 未離職）
    const mStart = new Date(yr,i,1);
    const mEnd   = new Date(yr,i+1,0);
    const denom = allStaff.filter(s=>{
      if(!s.joinDate) return false;
      const j=new Date(s.joinDate);
      if(j>mEnd) return false; // 尚未到職
      if(s.resigned){
        const rr=resignations.find(r=>r.id===s.id);
        if(rr){const rd=new Date(rr.resDate);if(rd<mStart)return false;} // 月初前已離職
      }
      return true;
    }).length;
    return {res:resCount, denom};
  });
  let cumRes=0;
  const rows = monthly.map((m,i)=>{
    cumRes+=m.res;
    const monthRate = m.denom>0 ? (m.res/m.denom*100).toFixed(2) : '0.00';
    const cumRate   = m.denom>0 ? (cumRes/m.denom*100).toFixed(2) : '0.00';
    return {...m, cumRes, monthRate, cumRate};
  });
  return rows;
}

        </select>
      </div>

    </div>
    <div class="form-field" style="margin-bottom:10px"><label>備註</label><input type="text" id="enote" value="${r.note||''}" placeholder="例如：個人因素、升學、轉職..." style="width:100%"></div>

      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveResignEdit(${idx})">💾 儲存</button>

}
function saveResignEdit(idx){

function confirmDeleteResign(idx){

function saveResign(){

function toggleInService(id){
  const s=staff.find(x=>x.id===id);
  if(!s)return;
  s.inService=!s.inService;
  toast(s.inService?'✅ '+s.name+' 設為在職進修中':'已取消 '+s.name+' 在職進修');
  render();fbSaveStaff();

function exportCSV(type){
  const BOM='\uFEFF';
  let headers,rows;
  if(type==='staff'){
    headers=['員編','姓名','職稱','等級','到職日','年資','特休(天)','執照別','學歷','在職進修','BLS到期','ACLS到期','ALS到期','壓力鍋(第一種)','小型鍋爐'];
    rows=active().map(s=>[s.id,s.name,s.title,s.level,s.joinDate,calcSen(s.joinDate).text,calcLeave(s.joinDate),s.licType,s.edu,s.inService?'是':'否',s.bls||'',s.acls||'',s.als||'',s.presFirst||'',s.presSmall||'']);
  }else if(type==='contact'){
    headers=['員編','姓名','職稱','身分證','護理學會號','信箱','手機','緊急聯絡','住所動向'];
    rows=active().map(s=>[s.id,s.name,s.title,s.id_no||'',s.nursing_member||'',s.email||'',s.phone||'',s.emergency||'',s.location||'']);
  }else if(type==='cert'){
    headers=['員編','姓名','職稱','證照','到期日','狀態','剩餘天數'];
    rows=[];
    active().forEach(s=>[{key:'bls',lbl:'BLS'},{key:'acls',lbl:'ACLS'},{key:'als',lbl:'ALS'}].forEach(cd=>{
      const st=certSt(s[cd.key]);
      rows.push([s.id,s.name,s.title,cd.lbl,s[cd.key]||'',st.lbl,st.days??'']);
    }));
  }else{
    headers=['員編','姓名','職稱','離職日期','備註'];
    rows=resignations.map(r=>[r.id,r.name,r.title,r.resDate,r.note||'']);
  }
  const fnames={'staff':'手術室護理人員明細','contact':'人員通訊錄','cert':'急救證照狀態','resign':'離職記錄'};
  const content=BOM+[headers,...rows].map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fnames[type]+'.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('✅ 已匯出：'+fnames[type]+'.csv');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity=1;
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity=0,2600);
}

// ═══════════════════════════════════════════════════════════
// FIREBASE REST API 同步（無需 SDK，直接 fetch）
// ═══════════════════════════════════════════════════════════
const FB = 'https://or-nursing-72cc9-default-rtdb.asia-southeast1.firebasedatabase.app';

async function fbGet(path){
  const r = await fetch(`${FB}/${path}.json`);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function fbPut(path, data){
  const r = await fetch(`${FB}/${path}.json`,{
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error(r.status);
}

function setSyncStatus(s){
  const el = document.getElementById('sync-indicator');
  if(!el) return;
  const m = {
    loading:{t:'⏳ 同步中…', c:'#e65100'},
    ok:     {t:'☁️ 已同步',  c:'#2e7d32'},
    error:  {t:'⚠️ 離線',    c:'#c62828'},
  }[s]||{t:'',c:''};
  el.textContent = m.t; el.style.color = m.c;
}

async function loadFromFirebase(){
  setSyncStatus('loading');
  try{
    const [sv, rv] = await Promise.all([fbGet('staff'), fbGet('resignations')]);
    if(sv && typeof sv==='object'){
      const arr = Array.isArray(sv) ? sv : Object.values(sv);
      const clean = arr.filter(Boolean);
      if(clean.length){
        staff = clean.map(s=>({
          ...s,
          inService: s.inService===true||s.inService==='true',
          resigned:  s.resigned===true||s.resigned==='true',
          bls:s.bls||null, acls:s.acls||null, als:s.als||null,
        }));
      }
    }
    if(rv && typeof rv==='object'){
      const arr = Array.isArray(rv) ? rv : Object.values(rv);
      const clean = arr.filter(Boolean);
      if(clean.length) resignations = clean;
    }
    setSyncStatus('ok');
    destroyCharts(); render();
  }catch(e){
    setSyncStatus('error');
    render();
  }
}

async function fbSaveStaff(){
  setSyncStatus('loading');
  try{
    const obj={};
    staff.forEach(s=>{ obj[s.id]=s; });
    await fbPut('staff', obj);
    setSyncStatus('ok');
  }catch(e){ setSyncStatus('error'); }
}

async function fbSaveResign(){
  try{
    const obj={};
    resignations.forEach((r,i)=>{ obj['r'+i]=r; });
    await fbPut('resignations', obj);
  }catch(e){ setSyncStatus('error'); }
}
