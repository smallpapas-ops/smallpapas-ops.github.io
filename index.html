<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>特休預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f7f9fc;
  --border: #e2e8f0;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #718096;
  --accent: #3b6fd4;
  --accent2: #2f5bb7;
  --accent-light: #ebf0fb;
  --green: #38a169;
  --green-light: #f0fff4;
  --red: #e53e3e;
  --red-light: #fff5f5;
  --orange: #dd6b20;
  --orange-light: #fffaf0;
  --yellow: #d69e2e;
  --yellow-light: #fffff0;
  --purple: #805ad5;
  --purple-light: #faf5ff;
  --a-color: #3b6fd4;
  --b-color: #38a169;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
/* ─── NAV ─── */
.app-header{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(59,111,212,0.3);}
.app-title{font-size:16px;font-weight:700;letter-spacing:.5px;}
.header-right{display:flex;gap:8px;align-items:center;}
.user-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:99;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-item{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);}
/* ─── PANELS ─── */
.panel{display:none;padding:16px;max-width:960px;margin:0 auto;}
.panel.active{display:block;}
/* ─── CARDS ─── */
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text);}
/* ─── FORM ─── */
label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.form-row{margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.form-grid{grid-template-columns:1fr;}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-warning{background:var(--orange);color:#fff;}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-full{width:100%;}
/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-a{background:rgba(59,111,212,.12);color:var(--a-color);}
.badge-b{background:rgba(56,161,105,.12);color:var(--b-color);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-yellow{background:var(--yellow-light);color:var(--yellow);}
.badge-purple{background:var(--purple-light);color:var(--purple);}
.badge-gray{background:var(--surface2);color:var(--text3);}
/* ─── MEMBER CARDS ─── */
.member-card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--a-color);}
.member-card.b-group{border-left-color:var(--b-color);}
.member-name{font-size:15px;font-weight:600;}
.member-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.member-leave{display:flex;align-items:center;gap:8px;margin-top:8px;}
.leave-pill{background:var(--accent-light);color:var(--accent);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:600px){.grid-3{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}
/* ─── RECORD ITEM ─── */
.record-item{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;}
.record-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.record-name{font-weight:600;font-size:14px;}
.record-dates{font-size:13px;color:var(--text2);margin-top:4px;}
.record-footer{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
/* ─── CALENDAR ─── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;}
.cal-day{min-height:70px;background:var(--surface2);border-radius:6px;padding:4px;font-size:12px;position:relative;}
.cal-day.today{background:var(--accent-light);border:1px solid var(--accent);}
.cal-day.other-month{opacity:.4;}
.cal-day .day-num{font-weight:600;color:var(--text2);}
.cal-day.weekend .day-num{color:var(--red);}
.cal-events{margin-top:2px;display:flex;flex-direction:column;gap:1px;}
.cal-event{font-size:10px;padding:1px 4px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-event.a-ev{background:rgba(59,111,212,.15);color:var(--a-color);}
.cal-event.b-ev{background:rgba(56,161,105,.15);color:var(--b-color);}
/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);}
/* ─── KPI ─── */
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
.kpi-val{font-size:28px;font-weight:700;color:var(--accent);}
.kpi-label{font-size:12px;color:var(--text3);margin-top:4px;}
/* ─── ALERT ─── */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;}
.alert-warn{background:var(--orange-light);color:var(--orange);border-left:3px solid var(--orange);}
.alert-err{background:var(--red-light);color:var(--red);border-left:3px solid var(--red);}
.alert-ok{background:var(--green-light);color:var(--green);border-left:3px solid var(--green);}
.alert-info{background:var(--accent-light);color:var(--accent);border-left:3px solid var(--accent);}
/* ─── TOGGLE ─── */
.type-toggle{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:12px;}
.type-btn{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);transition:all .2s;}
.type-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow);}
/* ─── SECTION HEAD ─── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:15px;font-weight:700;color:var(--text);}
/* ─── LOGIN ─── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#3b6fd4,#805ad5);}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:90%;max-width:360px;box-shadow:var(--shadow-lg);}
.login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:24px;}
/* ─── FILTER BAR ─── */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .2s;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* ─── DRAG HANDLE ─── */
.drag-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
/* ─── LEAVE BAR ─── */
.leave-bar-wrap{background:var(--surface2);border-radius:8px;overflow:hidden;height:8px;margin-top:4px;}
.leave-bar{height:100%;background:var(--accent);border-radius:8px;transition:width .5s;}
/* ─── STEP INDICATOR ─── */
.steps{display:flex;align-items:center;gap:4px;margin-bottom:16px;}
.step{flex:1;height:4px;border-radius:2px;background:var(--border);}
.step.done{background:var(--accent);}
/* ─── CONFLICT ─── */
.conflict-box{background:var(--red-light);border:1px solid #fed7d7;border-radius:var(--radius-sm);padding:12px;margin:10px 0;}
.suggest-box{background:var(--green-light);border:1px solid #c6f6d5;border-radius:var(--radius-sm);padding:12px;margin:10px 0;}
/* misc */
.divider{height:1px;background:var(--border);margin:12px 0;}
.text-sm{font-size:12px;color:var(--text3);}
.text-muted{color:var(--text3);}
.mt-8{margin-top:8px;}
.mt-12{margin-top:12px;}
.flex{display:flex;}
.items-center{align-items:center;}
.gap-8{gap:8px;}
.justify-between{justify-content:space-between;}
.w-full{width:100%;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);}
td{padding:8px 10px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.qr-wrap{text-align:center;padding:20px;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
</style>
<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBfktGpdLguFvEcncQXTrf6xf5oDFf08oY",
    authDomain: "leave-system-2026-5a36f.firebaseapp.com",
    projectId: "leave-system-2026-5a36f",
    storageBucket: "leave-system-2026-5a36f.firebasestorage.app",
    messagingSenderId: "698441014212",
    appId: "1:698441014212:web:7bf9cc77d6989c820f2291"
  };
  firebase.initializeApp(firebaseConfig);
  const _db = firebase.firestore();

  // ── FIX 4: 儲存到 Firebase 時，排除 calYear/calMonth（這是本機 UI 狀態，不應同步）
  window._fbSave = async function(stateObj) {
    try {
      const toSave = {
        applications: stateObj.applications,
        members: stateObj.members,
        adminPassword: stateObj.adminPassword
        // 故意不存 calYear / calMonth / currentUserId
      };
      await _db.collection('state').doc('main').set({ data: JSON.stringify(toSave) });
    } catch(e) { console.error('Firebase save error', e); }
  };

  window._fbLoad = async function() {
    try {
      const snap = await _db.collection('state').doc('main').get();
      if(snap.exists) return JSON.parse(snap.data().data);
    } catch(e) { console.error('Firebase load error', e); }
    return null;
  };

  window._fbListen = function(callback) {
    return _db.collection('state').doc('main').onSnapshot((snap) => {
      if(snap.exists) {
        try { callback(JSON.parse(snap.data().data)); } catch(e) {}
      }
    });
  };

  window._fbReady = true;
</script>
</head>
<body>

<!-- ══════ MAIN APP ══════ -->
<div id="app">
  <header class="app-header">
    <div class="app-title">🌿 特休預約系統</div>
    <div class="header-right">
      <span id="currentUserBadge" style="font-size:12px;opacity:.8;"></span>
      <button class="user-btn" onclick="switchUser()">切換用戶</button>
    </div>
  </header>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="apply" onclick="switchTab('apply',this)">📋 申請特休</div>
    <div class="tab-item" data-tab="records" onclick="switchTab('records',this)">📁 申請紀錄</div>
    <div class="tab-item" data-tab="groups" onclick="switchTab('groups',this)">👥 AB分組</div>
    <div class="tab-item" data-tab="calendar" onclick="switchTab('calendar',this)">📅 月曆總覽</div>
    <div class="tab-item" data-tab="admin" onclick="openAdmin()">🔐 主管</div>
  </div>

  <!-- ══ TAB 1: APPLY ══ -->
  <div class="panel active" id="tab-apply">
    <div class="card">
      <div class="card-title">👤 目前用戶</div>
      <div id="userSelector">
        <div class="form-row">
          <label>輸入姓名或員工編號</label>
          <input type="text" id="userInput" placeholder="例：李靜怡 或 10361" oninput="searchUser(this.value)">
        </div>
        <div id="userSuggestions" style="margin-top:4px;"></div>
        <div id="selectedUserInfo" style="margin-top:8px;"></div>
      </div>
    </div>

    <div class="card" id="applyFormCard" style="display:none;">
      <div class="card-title">新增特休申請</div>
      <div class="type-toggle">
        <div class="type-btn active" onclick="setApplyType('normal',this)">一般申請</div>
        <div class="type-btn" onclick="setApplyType('swap',this)">對調申請</div>
      </div>

      <!-- Normal form -->
      <div id="normalForm">
        <div class="form-row">
          <label>假期類型</label>
          <select id="normalType">
            <option value="short">短假 (1–4天)</option>
            <option value="long">長假 (5–15天)</option>
          </select>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>開始日期</label>
            <input type="date" id="normalStart" onchange="calcNormalDays()">
          </div>
          <div class="form-row">
            <label>結束日期</label>
            <input type="date" id="normalEnd" onchange="calcNormalDays()">
          </div>
        </div>
        <div id="normalDayCount" class="text-sm mt-8"></div>
        <div id="normalConflict" class="mt-8"></div>
        <div id="normalLeaveInfo" class="mt-8"></div>
        <button id="submitNormalBtn" class="btn btn-primary btn-full mt-12" onclick="submitNormal()">📤 送出申請</button>
      </div>

      <!-- Swap form -->
      <div id="swapForm" style="display:none;">
        <div class="alert alert-info">對調申請：選另一組人員，填寫您的假期日期（5–15天）</div>
        <div class="form-row">
          <label>對調人員員工編號（另一組）</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="swapPartnerInput" placeholder="輸入員工編號" maxlength="10" style="flex:1;" oninput="lookupSwapPartner(this.value)">
          </div>
        </div>
        <div id="selectedPartnerInfo" class="mt-8"></div>
        <div class="form-grid">
          <div class="form-row">
            <label>假期開始日</label>
            <input type="date" id="swapMyStart" onchange="calcSwapDays()">
          </div>
          <div class="form-row">
            <label>假期結束日</label>
            <input type="date" id="swapMyEnd" onchange="calcSwapDays()">
          </div>
        </div>
        <div id="swapDayCount" class="text-sm mt-8"></div>
        <div id="swapConflict" class="mt-8"></div>
        <button class="btn btn-primary btn-full mt-12" onclick="submitSwap()">📤 送出對調申請</button>
      </div>
    </div>
  </div>

  <!-- ══ TAB 2: RECORDS ══ -->
  <div class="panel" id="tab-records">
    <div class="filter-bar" id="recordFilter">
      <div class="filter-chip active" onclick="filterRecords('all',this)">全部</div>
      <div class="filter-chip" onclick="filterRecords('pending',this)">待審核</div>
      <div class="filter-chip" onclick="filterRecords('done',this)">已完成</div>
      <div class="filter-chip" onclick="filterRecords('swap_pending',this)">對調待確認</div>
      <div class="filter-chip" onclick="filterRecords('swap_expired',this)">對調逾期</div>
      <div class="filter-chip" onclick="filterRecords('rejected',this)">已退件</div>
    </div>
    <div id="recordsList"></div>
  </div>

  <!-- ══ TAB 3: GROUPS ══ -->
  <div class="panel" id="tab-groups">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <div class="sec-head">
          <div class="sec-title">A 組成員</div>
          <span class="badge badge-a">A</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;" id="groupA"></div>
      </div>
      <div>
        <div class="sec-head">
          <div class="sec-title">B 組成員</div>
          <span class="badge badge-b">B</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;" id="groupB"></div>
      </div>
    </div>
  </div>

  <!-- ══ TAB 4: CALENDAR ══ -->
  <div class="panel" id="tab-calendar">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <div id="calTitle" style="font-weight:700;font-size:16px;"></div>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="card">
      <div class="card-title" id="calMonthSummaryTitle">本月特休總覽</div>
      <div id="calMonthSummary"></div>
    </div>
  </div>
</div>

<!-- ══════ ADMIN LOGIN ══════ -->
<div id="adminLoginWrap" style="display:none;" class="login-wrap">
  <div class="login-card">
    <div class="login-title">🔐 主管登入</div>
    <div class="form-row">
      <label>管理員密碼</label>
      <input type="password" id="adminPwInput" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')checkAdminPw()">
    </div>
    <div id="adminPwErr" class="alert alert-err" style="display:none;">密碼錯誤</div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-ghost flex-1" onclick="closeAdminLogin()">取消</button>
      <button class="btn btn-primary flex-1" onclick="checkAdminPw()">登入</button>
    </div>
  </div>
</div>

<!-- ══════ ADMIN PANEL ══════ -->
<div id="adminPanel" style="display:none;">
  <header class="app-header" style="background:#1a202c;">
    <div class="app-title">🔐 主管管理介面</div>
    <button class="user-btn" onclick="closeAdmin()">← 返回</button>
  </header>
  <div style="max-width:960px;margin:0 auto;">
    <div class="tab-bar" id="adminTabBar">
      <div class="tab-item active" data-tab="a-overview" onclick="switchAdminTab('a-overview',this)">📊 總覽</div>
      <div class="tab-item" data-tab="a-pending" onclick="switchAdminTab('a-pending',this)">⏳ 待審核</div>

// ── FIX 4: saveState 只把 business data 推到 Firebase，calYear/calMonth 只存 localStorage
let _saveTimer = null;
function saveState(){
  try{ localStorage.setItem('leaveSystemState',JSON.stringify(state)); }catch(e){}
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    if(window._fbSave){
      _ignoreNext = true;
      await window._fbSave(state); // _fbSave 已過濾掉 calYear/calMonth
    }
  }, 300);
}

let _isListening = false;
let _ignoreNext = false;

function startFirebaseSync(){
  if(_isListening) return;
  _isListening = true;
  if(!window._fbLoad) return;

  // ── FIX 1 & 2: 啟動時從 Firebase 載入，不先推本機資料上去
  window._fbLoad().then(remote => {
    if(remote && remote.members){
      state.applications = remote.applications || [];
      state.members = remote.members || state.members;
      state.adminPassword = remote.adminPassword || state.adminPassword;
      // ── FIX 3: 不從 remote 恢復 calYear/calMonth，保持本機月曆視角
      state.currentUserId = null;
      try{ localStorage.setItem('leaveSystemState',JSON.stringify(state)); }catch(e){}
      renderCurrentTab();
      showSyncBadge('☁️ 已從雲端載入');
    }

    // 即時監聽其他裝置的變更
    window._fbListen((remote) => {
      if(_ignoreNext){ _ignoreNext=false; return; }
      if(!remote || !remote.members) return;
      const myUser = currentUserId;
      const myCalYear = calYear;   // ── FIX 3: 保留本機月曆視角
      const myCalMonth = calMonth;
      state.applications = remote.applications || [];
      state.members = remote.members || state.members;
      state.adminPassword = remote.adminPassword || state.adminPassword;
      state.currentUserId = myUser;
      state.calYear = myCalYear;   // 不被遠端覆蓋
      state.calMonth = myCalMonth;
      calYear = myCalYear;
      calMonth = myCalMonth;
      try{ localStorage.setItem('leaveSystemState',JSON.stringify(state)); }catch(e){}
      renderCurrentTab();
      showSyncBadge('🔄 已同步更新');
    });
  });
}

// ── TAIWAN HOLIDAYS (2025-2026 simplified) ──
const TW_HOLIDAYS = new Set([
  '2026-01-01','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-23',
  '2026-02-24','2026-04-03','2026-04-04','2026-04-05','2026-05-01',

  '2025-01-01','2025-02-01','2025-02-10','2025-04-04','2025-05-01',
  '2025-05-31','2025-10-10',
]);

function isHoliday(d){
  const dow = d.getDay();
  if(dow===0||dow===6) return true;
  return TW_HOLIDAYS.has(fmtDate(d));
}
function countWorkdays(start,end){
  let count=0, d=new Date(start);
  d.setHours(0,0,0,0);
  const e=new Date(end); e.setHours(0,0,0,0);
  while(d<=e){ if(!isHoliday(d)) count++; d.setDate(d.getDate()+1); }
  return count;
}
function fmtDate(d){ return d.toISOString().slice(0,10); }
function parseDate(s){ const d=new Date(s); d.setHours(0,0,0,0); return d; }
function todayStr(){ return fmtDate(new Date()); }

// ── LEAVE CALCULATION ──
function calcLeave(joinDateStr){
  const join = parseDate(joinDateStr.replace(/\//g,'-'));
  const today = new Date(); today.setHours(0,0,0,0);
  const ms = today - join;
  const years = ms/(1000*60*60*24*365.25);
  const months = ms/(1000*60*60*24*30.44);
  if(months < 6) return 0;
  if(months < 12) return 3;
  if(years < 2) return 7;
  if(years < 3) return 10;
  if(years < 5) return 14;
  if(years < 10) return 15;
  return Math.min(15 + Math.floor(years-10), 30);
}
function getMember(id){ return state.members.find(m=>m.id===id); }
function getMemberLeave(id){
  const m=getMember(id); if(!m) return 0;
  return m.customLeave!=null ? m.customLeave : calcLeave(m.join);
}
function usedLeave(memberId,year){
  return state.applications
    .filter(a=>a.applicantId===memberId && a.status==='done' && a.startDate.startsWith(year+''))
    .reduce((s,a)=>s+a.workdays,0);
}
function remainLeave(memberId){
  const total=getMemberLeave(memberId);
  const used=usedLeave(memberId,new Date().getFullYear());
  return total-used;
}

function calcNormalDays(){
  const s=document.getElementById('normalStart').value;
  const e=document.getElementById('normalEnd').value;
  const btn=document.getElementById('submitNormalBtn');
  if(!s||!e){
    document.getElementById('normalDayCount').innerHTML='';
    // 重置按鈕（日期清空時）
    if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer'; btn.textContent='📤 送出申請'; }
    return;
  }
  if(parseDate(e)<parseDate(s)){document.getElementById('normalDayCount').innerHTML='<span style="color:var(--red)">結束日期不可早於開始日期</span>';return;}
  const wd=countWorkdays(parseDate(s),parseDate(e));
  document.getElementById('normalDayCount').innerHTML=`計算工作天數：<b>${wd}</b>天`;
  checkNormalConflict(s,e,wd);
}

function checkNormalConflict(startStr,endStr,wd){
  const m=getCurrentUser(); if(!m) return;
  const start=parseDate(startStr), end=parseDate(endStr);
  const conflicts=[];
  const sameGroup = state.members.filter(x=>x.group===m.group && x.id!==m.id);
  for(const other of sameGroup){
    const otherApps = state.applications.filter(a=>a.applicantId===other.id && ['done','pending'].includes(a.status));
    for(const app of otherApps){
      const as=parseDate(app.startDate), ae=parseDate(app.endDate);
      if(start<=ae && end>=as){
        const overlapDays=[];
        let d=new Date(Math.max(start,as));
        while(d<=new Date(Math.min(end,ae))){ if(!isHoliday(d)) overlapDays.push(fmtDate(d)); d.setDate(d.getDate()+1); }
        if(overlapDays.length>0) conflicts.push({name:other.name,days:overlapDays,wd:overlapDays.length});
      }
    }
  }

  let html='';
  let blocked=false; // 是否阻擋送出

  // 長假工作日衝突 → 阻擋
  if(conflicts.length>0 && wd>=5){
    blocked=true;
    html+=`<div class="conflict-box">⛔ <b>工作日衝突，無法送出申請</b><br>`;
    for(const c of conflicts) html+=`與 ${c.name} 重疊 ${c.wd} 個工作日（${c.days[0]} ~ ${c.days[c.days.length-1]}）<br>`;
    html+=`</div>`;
    const busyDays=new Set(conflicts.flatMap(c=>c.days));
    const segments=getSuggestSegments(start,end,busyDays);
    if(segments.length>0){
      html+=`<div class="suggest-box">📋 建議改為分段申請：<br>`;
      for(const seg of segments) html+=`${seg.start} – ${seg.end}（${seg.wd} 工作天）<br>`;
      html+=`💡 也可改用對調申請方式</div>`;
    }
  }

  // 超過個人特休1/2 → 阻擋
  const total=getMemberLeave(m.id);
  const halfQuota=Math.floor(total/2);
  if(wd>=5 && wd>halfQuota){
    blocked=true;
    html+=`<div class="alert alert-err">⛔ 長假天數超過個人特休1/2（上限 ${halfQuota} 天），無法送出</div>`;
  }

  // 本組已有長假名額 → 阻擋
  if(wd>=5){
    const longConflict=checkLongLeaveConflict(m.group,start,end,m.id);
    if(longConflict){
      blocked=true;
      html+=`<div class="alert alert-err">⛔ 本組已有長假預約名額（${longConflict}），無法送出</div>`;
    }
  }

  document.getElementById('normalConflict').innerHTML=html;
  const used=usedLeave(m.id,new Date().getFullYear());
  document.getElementById('normalLeaveInfo').innerHTML=`<div class="text-sm">剩餘特休：${total-used}天 | 本次申請：${wd}天</div>`;

  // 控制送出按鈕的啟用/停用狀態
  const btn=document.getElementById('submitNormalBtn');
  if(btn){
    btn.disabled=blocked;
    btn.style.opacity=blocked?'0.4':'1';
    btn.style.cursor=blocked?'not-allowed':'pointer';
    btn.textContent=blocked?'⛔ 無法送出（請先解決衝突）':'📤 送出申請';
  }
}

function checkLongLeaveConflict(group,start,end,excludeId){
  const sameGroup=state.members.filter(m=>m.group===group&&m.id!==excludeId);
  for(const m of sameGroup){
    const longApps=state.applications.filter(a=>a.applicantId===m.id && a.workdays>=5 && ['done','pending'].includes(a.status));
    for(const app of longApps){
      const as=parseDate(app.startDate),ae=parseDate(app.endDate);
      if(start<=ae&&end>=as && !isHolidayRange(start,end)) return m.name;
    }
  }
  return null;
}
function isHolidayRange(start,end){
  let d=new Date(start);
  while(d<=end){ if(!isHoliday(d)) return false; d.setDate(d.getDate()+1); }
  return true;
}
function getSuggestSegments(start,end,busyDays){
  const segs=[];
  let segStart=null, segEnd=null;
  let d=new Date(start);
  while(d<=end){
    const key=fmtDate(d);
    if(!isHoliday(d)&&!busyDays.has(key)){
      if(!segStart) segStart=new Date(d);
      segEnd=new Date(d);
    } else {
      if(segStart){ segs.push({start:fmtDate(segStart),end:fmtDate(segEnd),wd:countWorkdays(segStart,segEnd)}); segStart=null; }
    }
    d.setDate(d.getDate()+1);
  }
  if(segStart) segs.push({start:fmtDate(segStart),end:fmtDate(segEnd),wd:countWorkdays(segStart,segEnd)});
  return segs;
}

// ── SUBMIT NORMAL ──
function submitNormal(){
  const m=getCurrentUser();
  if(!m){alert('請先選擇用戶');return;}
  const s=document.getElementById('normalStart').value;
  const e=document.getElementById('normalEnd').value;
  if(!s||!e){alert('請填寫日期');return;}
  const start=parseDate(s),end=parseDate(e);
  if(end<start){alert('結束日期不可早於開始日期');return;}
  const max=parseDate(getMaxFutureDate());
  if(end>max){alert('不可超過未來8個月');return;}
  const today=new Date();today.setHours(0,0,0,0);
  if(start<today){alert('不可申請過去日期');return;}
  const wd=countWorkdays(start,end);
  const total=getMemberLeave(m.id);
  if(wd>total){alert(`申請天數(${wd})超過特休總額(${total})`);return;}
  const halfQuota=Math.floor(total/2);
  if(wd>=5&&wd>halfQuota){alert(`⛔ 長假天數超過個人特休1/2（上限 ${halfQuota} 天）`);return;}

  // 長假：檢查工作日衝突
  if(wd>=5){
    const sameGroup=state.members.filter(x=>x.group===m.group && x.id!==m.id);
    for(const other of sameGroup){
      const otherApps=state.applications.filter(a=>a.applicantId===other.id && ['done','pending'].includes(a.status));
      for(const app of otherApps){
        const as=parseDate(app.startDate), ae=parseDate(app.endDate);
        if(start<=ae && end>=as){
          let overlap=0;
          let d=new Date(Math.max(start,as));
          while(d<=new Date(Math.min(end,ae))){ if(!isHoliday(d)) overlap++; d.setDate(d.getDate()+1); }
          if(overlap>0){ alert(`⛔ 與 ${other.name} 有 ${overlap} 個工作日重疊，無法送出申請\n請改為分段申請或使用對調申請`); return; }
        }
      }
    }
    const lc=checkLongLeaveConflict(m.group,start,end,m.id);
    if(lc){alert(`⛔ 本組已有長假預約名額（${lc}），無法送出`);return;}
  }

  const app={
    id:'APP'+Date.now(),
    applicantId:m.id, applicantName:m.name, group:m.group,
    type:'normal', startDate:s, endDate:e, workdays:wd,
    status:'pending', appliedAt:new Date().toISOString(), note:'', history:[]
  };
  state.applications.push(app);
  saveState();
  alert(`申請成功！已送出等待主管審核\n${m.name}：${s} ~ ${e}（${wd}工作天）`);
  document.getElementById('normalStart').value='';
  document.getElementById('normalEnd').value='';
  document.getElementById('normalDayCount').innerHTML='';
  document.getElementById('normalConflict').innerHTML='';
  document.getElementById('normalLeaveInfo').innerHTML='';
  // 重置按鈕狀態
  const btn=document.getElementById('submitNormalBtn');
  if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.textContent='📤 送出申請'; }
}

function renderRecordItem(a,isAdmin){
  const partner=a.partnerId?getMember(a.partnerId):null;
  const statusMap={pending:'badge-yellow',done:'badge-green',rejected:'badge-red',swap_pending:'badge-orange',swap_expired:'badge-red'};
  let actionBtns='';
  if(isAdmin){
    if(a.status==='pending'||a.status==='swap_pending'){
      actionBtns+=`<button class="btn btn-success btn-sm" onclick="approveApp('${a.id}','done')">✓ 核准</button>
        <button class="btn btn-danger btn-sm" onclick="approveApp('${a.id}','rejected')">✗ 退件</button>`;
    }
    actionBtns+=`<button class="btn btn-ghost btn-sm" onclick="openAdminEdit('${a.id}')">✏️ 修改</button>`;
  } else {
    if(a.status==='swap_pending' && a.partnerId===currentUserId){
      actionBtns+=`<button class="btn btn-success btn-sm" onclick="confirmSwap('${a.id}',true)">✓ 確認對調</button>
        <button class="btn btn-danger btn-sm" onclick="confirmSwap('${a.id}',false)">✗ 拒絕</button>`;
    }
  }
  return `<div class="record-item">
    <div class="record-header">
      <div>
        <div class="record-name">${a.applicantName} <span class="badge badge-${(a.group||'A').toLowerCase()}">${a.group||'A'}組</span></div>
        <div class="record-dates">${a.startDate} ~ ${a.endDate}（${a.workdays}工作天）
          ${a.type==='swap'?`<br>對調：${partner?partner.name:a.partnerName}`:''}
        </div>
      </div>
      <span class="badge ${statusMap[a.status]||'badge-gray'}">${statusLabel(a.status)}</span>
    </div>
    <div class="record-footer">
      <span class="badge ${a.type==='swap'?'badge-purple':'badge-gray'}">${a.type==='swap'?'對調':'一般'}</span>
      <span class="text-sm">${a.appliedAt?a.appliedAt.slice(0,16).replace('T',' '):''}</span>
      ${actionBtns}
    </div>
  </div>`;
}

function statusLabel(s){
  const m={pending:'待審核',done:'已完成',rejected:'已退件',swap_pending:'對調待確認',swap_expired:'對調逾期'};
  return m[s]||s;
}

function confirmSwap(id,confirm){
  const app=state.applications.find(a=>a.id===id); if(!app) return;
  if(confirm){
    app.status='pending';
    app.partnerConfirmed=true;
    app.history.push({at:new Date().toISOString(),note:'對調人員已確認'});
    alert('已確認對調，等待主管審核');
  } else {
    app.status='rejected';
    app.history.push({at:new Date().toISOString(),note:'對調人員拒絕'});
    alert('已拒絕對調申請');
  }
  saveState();
  renderRecords(recordFilter);
}

function checkExpiredSwaps(){
  const now=new Date();
  let changed=false;
  state.applications.filter(a=>a.status==='swap_pending').forEach(a=>{
    const diff=(now-new Date(a.appliedAt))/(1000*60*60*24);
    if(diff>14){ a.status='swap_expired'; changed=true; }
  });
  if(changed) saveState();
}

// ── FIX 3: calYear/calMonth 是本機 UI 狀態，不寫入 Firebase
let calYear = (()=>{ try{ const s=localStorage.getItem('leaveSystemState'); if(s){ const p=JSON.parse(s); return p.calYear||new Date().getFullYear(); } }catch(e){} return new Date().getFullYear(); })();
let calMonth = (()=>{ try{ const s=localStorage.getItem('leaveSystemState'); if(s){ const p=JSON.parse(s); return p.calMonth!=null?p.calMonth:new Date().getMonth(); } }catch(e){} return new Date().getMonth(); })();

function calPrev(){
  calMonth--;
  if(calMonth<0){calMonth=11;calYear--;}
  state.calYear=calYear; state.calMonth=calMonth;
  saveCalendarLocal(); // ── FIX 2: 只存本機，不推 Firebase
  renderCalendar();
}
function calNext(){
  calMonth++;
  if(calMonth>11){calMonth=0;calYear++;}
  state.calYear=calYear; state.calMonth=calMonth;
  saveCalendarLocal(); // ── FIX 2: 只存本機，不推 Firebase
  renderCalendar();
}

function renderCalendar(){
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calTitle').textContent=`${calYear}年 ${monthNames[calMonth]}`;
  document.getElementById('calMonthSummaryTitle').textContent=`${calYear}年${monthNames[calMonth]} 特休總覽`;
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDow=first.getDay();
  const dows=['日','一','二','三','四','五','六'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day other-month"></div>`;
  const today=new Date(); today.setHours(0,0,0,0);
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(calYear,calMonth,day);
    const isToday=fmtDate(d)===fmtDate(today);
    const isWknd=d.getDay()===0||d.getDay()===6;
    const appsThisDay=state.applications.filter(a=>{
      if(!['done','pending'].includes(a.status)) return false;
      const as=parseDate(a.startDate),ae=parseDate(a.endDate);
      return d>=as&&d<=ae;
    });
    const evHtml=appsThisDay.slice(0,3).map(a=>`<div class="cal-event ${a.group==='A'?'a-ev':'b-ev'}">${a.applicantName}</div>`).join('');
    html+=`<div class="cal-day ${isToday?'today':''} ${isWknd?'weekend':''}">
      <div class="day-num">${day}</div>
      <div class="cal-events">${evHtml}${appsThisDay.length>3?`<div class="text-sm">+${appsThisDay.length-3}</div>`:''}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderMonthSummary();
}

function renderMonthSummary(){
  const monthApps=state.applications.filter(a=>{
    const as=parseDate(a.startDate), ae=parseDate(a.endDate);
    const mStart=new Date(calYear,calMonth,1), mEnd=new Date(calYear,calMonth+1,0);
    return as<=mEnd && ae>=mStart;
  }).sort((a,b)=>a.startDate.localeCompare(b.startDate));
  if(!monthApps.length){document.getElementById('calMonthSummary').innerHTML='<div class="text-muted">本月無特休申請</div>';return;}
  document.getElementById('calMonthSummary').innerHTML=`
    <table><thead><tr><th>姓名</th><th>組別</th><th>日期</th><th>天數</th><th>狀態</th></tr></thead>
    <tbody>${monthApps.map(a=>`<tr>
      <td>${a.applicantName}</td>
      <td><span class="badge badge-${(a.group||'A').toLowerCase()}">${a.group}</span></td>
      <td>${a.startDate}~${a.endDate}</td>
      <td>${a.workdays}</td>
      <td><span class="badge ${a.status==='done'?'badge-green':a.status==='pending'?'badge-yellow':'badge-red'}">${statusLabel(a.status)}</span></td>
    </tr>`).join('')}</tbody></table>`;
}

  renderAdminRecords(adminRecordFilter2);
  renderAdminPending();
  renderAdminKpiCards();
  renderRecords(recordFilter);
  renderCalendar();
}
function openAdminEdit(id){
  const app=state.applications.find(a=>a.id===id); if(!app) return;
  document.getElementById('adminEditContent').innerHTML=`
    <div class="form-row"><label>申請人</label>
      <select id="editApplicant">${state.members.map(m=>`<option value="${m.id}" ${m.id===app.applicantId?'selected':''}>${m.name}（${m.group}組）</option>`).join('')}</select>
    </div>
    <div class="form-grid">
      <div class="form-row"><label>開始日期</label><input type="date" id="editStart" value="${app.startDate}"></div>
      <div class="form-row"><label>結束日期</label><input type="date" id="editEnd" value="${app.endDate}"></div>
    </div>
    <div class="form-row"><label>假期類型</label>
      <select id="editType"><option value="normal" ${app.type==='normal'?'selected':''}>一般</option><option value="swap" ${app.type==='swap'?'selected':''}>對調</option></select>
    </div>
    ${app.type==='swap'?`<div class="form-row"><label>對調人員</label>
      <select id="editPartner">${state.members.map(m=>`<option value="${m.id}" ${m.id===app.partnerId?'selected':''}>${m.name}（${m.group}組）</option>`).join('')}</select>
    </div>`:''}
    <div class="form-row"><label>狀態</label>
      <select id="editStatus">
        <option value="pending" ${app.status==='pending'?'selected':''}>待審核</option>
        <option value="done" ${app.status==='done'?'selected':''}>已完成</option>
        <option value="rejected" ${app.status==='rejected'?'selected':''}>已退件</option>
        <option value="swap_pending" ${app.status==='swap_pending'?'selected':''}>對調待確認</option>
      </select>
    </div>
    <div class="form-row"><label>備註/修改原因</label><textarea id="editNote" rows="2">${app.note||''}</textarea></div>
    <button class="btn btn-primary btn-full mt-12" onclick="saveAdminEdit('${id}')">儲存</button>`;
  document.getElementById('adminEditOverlay').classList.add('active');
}
function saveAdminEdit(id){
  const app=state.applications.find(a=>a.id===id); if(!app) return;
  const newApplicantId=document.getElementById('editApplicant').value;
  const newMember=getMember(newApplicantId);
  app.applicantId=newApplicantId; app.applicantName=newMember.name; app.group=newMember.group;
  app.startDate=document.getElementById('editStart').value;
  app.endDate=document.getElementById('editEnd').value;
  app.workdays=countWorkdays(parseDate(app.startDate),parseDate(app.endDate));
  app.type=document.getElementById('editType').value;
  if(app.type==='swap'&&document.getElementById('editPartner')){
    app.partnerId=document.getElementById('editPartner').value;
    app.partnerName=getMember(app.partnerId)?.name||'';
  }
  app.status=document.getElementById('editStatus').value;
  const note=document.getElementById('editNote').value;
  if(note) app.note=note;
  app.history.push({at:new Date().toISOString(),note:'主管修改：'+note});
  saveState();
  closeOverlay('adminEditOverlay');
  renderAdminRecords(adminRecordFilter2);
  renderAdminPending();
  renderCalendar();
  alert('已儲存修改');
}
function renderAdminMembers(){
  document.getElementById('adminMemberList').innerHTML=`<div class="grid-2">${state.members.map(m=>renderMemberCard(m,true)).join('')}</div>`;
}
function openEditMember(id){
  const m=getMember(id); if(!m) return;
  document.getElementById('editMemberContent').innerHTML=`
    <div class="form-row"><label>姓名</label><input type="text" id="emName" value="${m.name}"></div>
    <div class="form-row"><label>到職日</label><input type="date" id="emJoin" value="${m.join.replace(/\//g,'-')}"></div>
    <div class="form-row"><label>組別</label>
      <select id="emGroup"><option value="A" ${m.group==='A'?'selected':''}>A組</option><option value="B" ${m.group==='B'?'selected':''}>B組</option></select>
    </div>
    <div class="form-row"><label>自訂特休（留空=自動）</label><input type="number" id="emLeave" value="${m.customLeave!=null?m.customLeave:''}"></div>
    <button class="btn btn-primary btn-full mt-12" onclick="saveEditMember('${id}')">儲存</button>`;
  document.getElementById('editMemberOverlay').classList.add('active');
}
function saveEditMember(id){
  const m=getMember(id); if(!m) return;
  m.name=document.getElementById('emName').value;
  m.join=document.getElementById('emJoin').value.replace(/-/g,'/');
  m.group=document.getElementById('emGroup').value;
  const lv=document.getElementById('emLeave').value;
  m.customLeave=lv!==''?parseInt(lv):null;
  saveState();
  closeOverlay('editMemberOverlay');
  renderAdminMembers(); renderGroups();
  alert('已儲存');
}
function switchMemberGroup(id){
  const m=getMember(id); if(!m) return;
  if(!confirm(`確定將 ${m.name} 從 ${m.group}組 切換到 ${m.group==='A'?'B':'A'}組？`)) return;
  m.group=m.group==='A'?'B':'A';
  saveState(); renderAdminMembers(); renderGroups();
}
function addMember(){
  const id=document.getElementById('newEmpId').value.trim();
  const name=document.getElementById('newName').value.trim();
  const join=document.getElementById('newJoinDate').value;
  const group=document.getElementById('newGroup').value;
  const lv=document.getElementById('newLeave').value;
  if(!id||!name||!join){alert('請填寫必要欄位');return;}
  if(state.members.find(m=>m.id===id)){alert('員工編號已存在');return;}
  state.members.push({id,name,join:join.replace(/-/g,'/'),group,customLeave:lv!==''?parseInt(lv):null});
  saveState(); closeOverlay('addMemberOverlay'); renderAdminMembers(); renderGroups();
  alert('已新增組員：'+name);
}
function openAddMemberModal(){
  document.getElementById('newEmpId').value=''; document.getElementById('newName').value='';
  document.getElementById('newJoinDate').value=''; document.getElementById('newLeave').value='';
  document.getElementById('addMemberOverlay').classList.add('active');
}

// ── KPI ──
function renderKPI(){
  const apps=state.applications;
  const total=apps.length;
  const done=apps.filter(a=>a.status==='done').length;
  const swapTotal=apps.filter(a=>a.type==='swap').length;
  const swapDone=apps.filter(a=>a.type==='swap'&&a.status==='done').length;
  const longLeave=apps.filter(a=>a.workdays>=5&&a.status==='done').length;
  const expired=apps.filter(a=>a.status==='swap_expired').length;
  const pending=apps.filter(a=>a.status==='pending'||a.status==='swap_pending').length;
  const applyRate=state.members.length>0?Math.round(new Set(apps.map(a=>a.applicantId)).size/state.members.length*100):0;
  const successRate=total>0?Math.round(done/total*100):0;
  const swapRate=swapTotal>0?Math.round(swapDone/swapTotal*100):0;
  const longRate=done>0?Math.round(longLeave/done*100):0;
  const expiredRate=(swapTotal+expired)>0?Math.round(expired/(swapTotal+expired)*100):0;
  const unfinishRate=total>0?Math.round(pending/total*100):0;
  const monthlyCount={};
  apps.forEach(a=>{ const m=a.appliedAt?a.appliedAt.slice(0,7):'unknown'; monthlyCount[m]=(monthlyCount[m]||0)+1; });
  const personStats=state.members.map(m=>{
    const myApps=apps.filter(a=>a.applicantId===m.id);
    const myDone=myApps.filter(a=>a.status==='done').reduce((s,a)=>s+a.workdays,0);
    const total2=getMemberLeave(m.id);
    const rate=total2>0?Math.round(myDone/total2*100):0;
    return {name:m.name,group:m.group,count:myApps.length,used:myDone,total:total2,rate};
  }).sort((a,b)=>b.rate-a.rate);
  document.getElementById('kpiPanel').innerHTML=`
    <div class="grid-3" style="margin-bottom:16px;">
      <div class="kpi-card"><div class="kpi-val">${applyRate}%</div><div class="kpi-label">特休申請率</div></div>
      <div class="kpi-card"><div class="kpi-val">${successRate}%</div><div class="kpi-label">核准率</div></div>
      <div class="kpi-card"><div class="kpi-val">${swapRate}%</div><div class="kpi-label">對調成功率</div></div>
      <div class="kpi-card"><div class="kpi-val">${longRate}%</div><div class="kpi-label">長假使用率≥5天</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--red)">${expiredRate}%</div><div class="kpi-label">對調逾期率</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--orange)">${unfinishRate}%</div><div class="kpi-label">未完成比例</div></div>
    </div>
    <div class="card">
      <div class="card-title">每月申請數</div>
      ${Object.entries(monthlyCount).sort().map(([m,c])=>`<div class="stat-row"><span>${m}</span><span class="badge badge-a">${c}件</span></div>`).join('')||'<div class="text-muted">無資料</div>'}
    </div>
    <div class="card" style="margin-top:12px;">
      <div class="card-title">個人特休使用率</div>
      <table><thead><tr><th>姓名</th><th>組</th><th>申請次</th><th>已用天</th><th>總天數</th><th>使用率</th></tr></thead>
      <tbody>${personStats.map(p=>`<tr>
        <td>${p.name}</td>
        <td><span class="badge badge-${p.group.toLowerCase()}">${p.group}</span></td>
        <td>${p.count}</td><td>${p.used}</td><td>${p.total}</td>
        <td><div style="display:flex;align-items:center;gap:6px;">
          <div class="leave-bar-wrap" style="flex:1;"><div class="leave-bar" style="width:${p.rate}%;background:${p.rate>80?'var(--green)':'var(--accent)'}"></div></div>
          <span style="font-size:11px;">${p.rate}%</span>
        </div></td>
      </tr>`).join('')}</tbody></table>
    </div>`;
}

// ── EXPORT ──
function exportExcel(){
  if(!window.XLSX){alert('XLSX庫未載入');return;}
  const data=state.applications.map(a=>{
    const partner=a.partnerId?getMember(a.partnerId):null;
    return {'申請人':a.applicantName,'組別':a.group,'員工編號':a.applicantId,'開始日期':a.startDate,'結束日期':a.endDate,'工作天數':a.workdays,'類型':a.type==='swap'?'對調':'一般','對調人員':partner?partner.name:'','狀態':statusLabel(a.status),'申請時間':a.appliedAt?a.appliedAt.slice(0,19).replace('T',' '):''};
  });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'特休申請');
  XLSX.writeFile(wb,'特休申請紀錄.xlsx');
}
function exportCalendar(){
  if(!window.XLSX){alert('XLSX庫未載入');return;}
  const months={};
  state.applications.forEach(a=>{
    const m=a.startDate.slice(0,7); if(!months[m]) months[m]=[];
    const partner=a.partnerId?getMember(a.partnerId):null;
    months[m].push({'月份':m,'申請人':a.applicantName,'組別':a.group,'開始日期':a.startDate,'結束日期':a.endDate,'工作天數':a.workdays,'類型':a.type==='swap'?'對調':'一般','對調人員':partner?partner.name:'','狀態':statusLabel(a.status),'申請時間':a.appliedAt?a.appliedAt.slice(0,19).replace('T',' '):''});
  });
  const wb=XLSX.utils.book_new();
  Object.entries(months).sort().forEach(([m,rows])=>{ const ws=XLSX.utils.json_to_sheet(rows); XLSX.utils.book_append_sheet(wb,ws,m); });
  if(Object.keys(months).length===0) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([]),'空');
  XLSX.writeFile(wb,'每月特休總覽.xlsx');
}
function showQR(){
  const url=window.location.href;
  document.getElementById('qrContent').innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}" style="width:200px;height:200px;border-radius:8px;" alt="QR"><div class="text-sm mt-8">掃描QR Code開啟系統</div>`;
  document.getElementById('qrOverlay').classList.add('active');
}

// ── OVERLAY ──
function closeOverlay(id){ document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.overlay').forEach(o=>{ o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('active'); }); });

// ── TABS ──
function switchTab(tab,el){
  if(tab==='admin'){openAdmin();return;}
  document.querySelectorAll('#tabBar .tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#app .panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='records') renderRecords(recordFilter);
  if(tab==='groups') renderGroups();
  if(tab==='calendar') renderCalendar();
}

// ── INIT ──
// ── FIX 1: 啟動時先渲染畫面，再從 Firebase 載入最新資料（不先 saveState 覆蓋雲端）
function init(){
  currentUserId = null;
  const today=todayStr();
  const maxDate=getMaxFutureDate();
  ['normalStart','normalEnd','swapMyStart','swapMyEnd'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.min=today;el.max=maxDate;}
  });
  renderCalendar();
  // ── FIX 1: 啟動後立即連接 Firebase，從雲端拉取最新資料並開始監聽
  startFirebaseSync();
}

init();
